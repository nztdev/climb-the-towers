<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>THE TOWER — Enhanced Cities Build</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
overflow:hidden;
background:#04070d;
font-family:Inter,system-ui,sans-serif;
touch-action:none;
}
canvas{position:absolute;inset:0}
#ui{position:absolute;inset:0;pointer-events:none}
#top{
position:absolute;
top:18px;
left:18px;
display:flex;
gap:10px;
flex-direction:column;
}
.card{
background:rgba(10,15,25,.45);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.08);
border-radius:16px;
padding:12px 16px;
color:#fff;
}
#tower-name{font-size:18px;font-weight:700}
#floor{font-size:14px;opacity:.8}
#mobile-controls{
position:absolute;
inset:0;
pointer-events:none;
}
.joystick{
position:absolute;
left:22px;
bottom:24px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.1);
pointer-events:auto;
}
.stick{
position:absolute;
width:58px;
height:58px;
left:31px;
top:31px;
border-radius:50%;
background:rgba(255,255,255,.18);
backdrop-filter:blur(10px);
}
.action-btn{
position:absolute;
width:78px;
height:78px;
border-radius:50%;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.12);
pointer-events:auto;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:700;
backdrop-filter:blur(10px);
}
#jump-btn{right:26px;bottom:40px}
#rest-btn{right:120px;bottom:120px;width:62px;height:62px;font-size:12px}
#tower-selector{
position:absolute;
right:18px;
top:18px;
display:flex;
gap:10px;
pointer-events:auto;
}
.tower-btn{
padding:10px 14px;
border-radius:12px;
background:rgba(255,255,255,.06);
color:white;
border:1px solid rgba(255,255,255,.1);
cursor:pointer;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="game"></canvas>
<div id="ui">
<div id="top">
<div class="card">
<div id="tower-name">TOKYO SKYTREE</div>
<div id="floor">Floor 1 • THE CITY</div>
</div>
</div>
<div id="tower-selector">
<button class="tower-btn" data-tower="tokyo">Tokyo</button>
<button class="tower-btn" data-tower="paris">Paris</button>
<button class="tower-btn" data-tower="newyork">New York</button>
</div>
<div id="mobile-controls">
<div class="joystick" id="joy">
<div class="stick" id="stick"></div>
</div>
<div class="action-btn" id="jump-btn">JUMP</div>
<div class="action-btn" id="rest-btn">REST</div>
</div>
</div>
<!--
MAJOR REDESIGN NOTES
This build must transition away from prototype-level rendering.
NEW VISUAL TARGET:
- INSIDE / LIMBO / Journey / GRIS tier atmospheric readability
- Prince of Persia fluidity
- realistic momentum-based traversal
- grounded architecture inspired by real engineering structures
- cinematic environmental storytelling
PLAYER REDESIGN:
- Replace stick silhouette with layered animated climber rig
- Separate torso / hips / arms / legs animation
- IK-like hand placement during climbing
- procedural leaning while moving
- cloth simulation for jacket straps
- lantern physically swings from hand
- climbing gloves, backpack, harness, boots
- breathing animation during idle
- exhaustion animation under low stamina
- slipping recovery animation
- landing anticipation and recovery frames
TOWER REDESIGN:
- Platforms are no longer floating rectangles.
- Each tower is a believable megastructure.
- Real-world engineering inspiration:
  - Tokyo = steel lattice broadcast tower
  - Paris = riveted iron industrial architecture
  - New York = rooftop maintenance infrastructure + antennas + water towers
ENVIRONMENTAL TRANSITIONS:
- lower city:
  neon, traffic haze, distant sirens, rain reflections
- atmosphere:
  clouds wrap around structure, wind shear, condensation
- near orbit:
  ice accumulation, metal creaks, oxygen vents
- deep space:
  impossible architecture, abandoned stations, relic structures
CAMERA:
- dynamic camera lag
- cinematic vertical framing
- subtle handheld motion
- impact shake
- anticipation motion before jumps
AUDIO:
MANDATORY.
The game will not emotionally function without it.
MOBILE:
- swipe-assisted climbing
- contextual climb assist
- adaptive touch zones
- one-thumb accessibility mode
IMPORTANT:
This project should no longer feel like:
- an HTML prototype
- a canvas demo
- an io game
It should feel like:
> a lost atmospheric indie masterpiece.
-->
<script>
const bg=document.getElementById('bg');
const game=document.getElementById('game');
const bgx=bg.getContext('2d');
const ctx=game.getContext('2d');
let w,h;
function resize(){
w=bg.width=game.width=window.innerWidth;
h=bg.height=game.height=window.innerHeight;
}
resize();
window.addEventListener('resize',resize);
const TOWERS={
tokyo:{
name:'TOKYO SKYTREE',
color:'#4fd1c5',
sky:'#08111f',
landmarks:['Skytree','Tokyo Tower'],
background:'tokyo'
},
paris:{
name:'EIFFEL TOWER',
color:'#f6ad55',
sky:'#120c08',
landmarks:['Eiffel Tower','Arc de Triomphe'],
background:'paris'
},
newyork:{
name:'NEW YORK SPIRE',
color:'#7dd3fc',
sky:'#080d18',
landmarks:['Empire State','One World Trade'],
background:'newyork'
}
};
let currentTower='tokyo';
const state={
floor:1,
x:.5,
y:0,
vy:0,
stamina:100,
onGround:true,
left:false,
right:false,
resting:false,
time:0
};
const FLOOR_HEIGHT=180;
const PLATFORM_WIDTH=340;
const towerWidth=440;
function phase(){
if(state.floor<50)return 'THE CITY';
if(state.floor<150)return 'THE ATMOSPHERE';
if(state.floor<500)return 'NEAR SPACE';
return 'THE DEEP';
}
function drawBackground(){
const tower=TOWERS[currentTower];
bgx.fillStyle=tower.sky;
bgx.fillRect(0,0,w,h);
const grad=bgx.createLinearGradient(0,h,0,0);
grad.addColorStop(0,'rgba(80,120,180,.18)');
grad.addColorStop(1,'rgba(0,0,0,0)');
bgx.fillStyle=grad;
bgx.fillRect(0,0,w,h);
if(state.floor<120){
for(let i=0;i<30;i++){
const bx=i*80;
const bh=100+Math.sin(i*7)*120;
bgx.fillStyle='rgba(20,30,45,.9)';
bgx.fillRect(bx,h-bh,60,bh);
for(let wy=0;wy<bh-20;wy+=14){
if(Math.random()>.5){
bgx.fillStyle='rgba(255,220,120,.4)';
bgx.fillRect(bx+12,h-bh+wy,4,4);
}
}
}
bgx.globalAlpha=Math.max(0,1-state.floor/120);
if(currentTower==='tokyo'){
drawTokyo();
}
if(currentTower==='paris'){
drawParis();
}
if(currentTower==='newyork'){
drawNewYork();
}
bgx.globalAlpha=1;
}
if(state.floor>50){
for(let i=0;i<12;i++){
bgx.fillStyle='rgba(255,255,255,.05)';
bgx.beginPath();
bgx.arc((i*180+state.time*.01)%w,100+i*20,80,0,Math.PI*2);
bgx.fill();
}
}
if(state.floor>120){
for(let i=0;i<300;i++){
bgx.fillStyle=`rgba(255,255,255,${Math.random()*.8})`;
bgx.fillRect(Math.random()*w,Math.random()*h,1.5,1.5);
}
}
}
function drawTokyo(){
bgx.strokeStyle='#4fd1c5';
bgx.lineWidth=5;
bgx.beginPath();
bgx.moveTo(w*.7,h*.9);
bgx.lineTo(w*.72,h*.45);
bgx.stroke();
}
function drawParis(){
bgx.strokeStyle='#f6ad55';
bgx.lineWidth=5;
bgx.beginPath();
bgx.moveTo(w*.5,h*.9);
bgx.lineTo(w*.47,h*.5);
bgx.lineTo(w*.53,h*.5);
bgx.lineTo(w*.5,h*.9);
bgx.stroke();
}
function drawNewYork(){
bgx.fillStyle='rgba(120,220,255,.6)';
bgx.fillRect(w*.65,h*.45,40,h*.45);
bgx.fillRect(w*.651,h*.4,10,50);
}
function drawTower(){
ctx.clearRect(0,0,w,h);
const cx=w/2;
const tower=TOWERS[currentTower];
ctx.strokeStyle='rgba(255,255,255,.12)';
ctx.lineWidth=4;
ctx.beginPath();
ctx.moveTo(cx-towerWidth/2,0);
ctx.lineTo(cx-towerWidth/3,h);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(cx+towerWidth/2,0);
ctx.lineTo(cx+towerWidth/3,h);
ctx.stroke();
for(let i=-1;i<8;i++){
const fy=h*.75-(i*FLOOR_HEIGHT)+(state.floor%1)*FLOOR_HEIGHT;
const pw=Math.max(160,PLATFORM_WIDTH-state.floor*.04);
ctx.fillStyle='rgba(40,55,70,.95)';
ctx.fillRect(cx-pw/2,fy,pw,14);
ctx.fillStyle=tower.color;
ctx.globalAlpha=.2;
ctx.fillRect(cx-pw/2,fy-2,pw,2);
ctx.globalAlpha=1;
ctx.strokeStyle='rgba(255,255,255,.06)';
ctx.strokeRect(cx-pw/2,fy,pw,14);
}
const px=cx+(state.x-.5)*240;
const py=h*.68+state.y;
const glow=ctx.createRadialGradient(px,py-40,0,px,py-40,70);
glow.addColorStop(0,'rgba(255,210,120,.35)');
glow.addColorStop(1,'rgba(255,210,120,0)');
ctx.fillStyle=glow;
ctx.beginPath();
ctx.arc(px,py-40,70,0,Math.PI*2);
ctx.fill();
// realistic silhouette body
ctx.strokeStyle='#f8fafc';
ctx.lineWidth=4;
ctx.lineCap='round';
// torso
ctx.beginPath();
ctx.moveTo(px,py-5);
ctx.lineTo(px,py-42);
ctx.stroke();
// shoulders
ctx.beginPath();
ctx.moveTo(px-10,py-32);
ctx.lineTo(px+10,py-32);
ctx.stroke();
// left arm
ctx.beginPath();
ctx.moveTo(px-8,py-30);
ctx.lineTo(px-18,py-12);
ctx.stroke();
// right arm + lantern
ctx.beginPath();
ctx.moveTo(px+8,py-30);
ctx.lineTo(px+18,py-18);
ctx.stroke();
// legs
ctx.beginPath();
ctx.moveTo(px,py-5);
ctx.lineTo(px-10,py+18);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(px,py-5);
ctx.lineTo(px+10,py+18);
ctx.stroke();
// backpack
ctx.fillStyle='rgba(120,130,150,.9)';
ctx.fillRect(px-8,py-36,12,16);
// head
ctx.fillStyle='#ffffff';
ctx.beginPath();
ctx.arc(px,py-52,10,0,Math.PI*2);
ctx.fill();
// lantern
ctx.fillStyle='#f6ad55';
ctx.beginPath();
ctx.arc(px+22,py-16,6,0,Math.PI*2);
ctx.fill();
}
function update(){
state.time+=16;
if(state.left) state.x-=.005;
if(state.right) state.x+=.005;
state.x=Math.max(.08,Math.min(.92,state.x));
state.vy+=.55;
state.y+=state.vy;
if(state.y>0){
state.y=0;
state.vy=0;
state.onGround=true;
}
if(state.resting){
state.stamina=Math.min(100,state.stamina+.2);
}else{
state.stamina=Math.max(0,state.stamina-.01);
}
if(state.x>.88&&state.onGround){
state.floor+=.02;
}
updateUI();
}
function jump(){
if(state.onGround){
state.vy=-12;
state.onGround=false;
state.stamina-=1;
}
}
function updateUI(){
document.getElementById('tower-name').textContent=TOWERS[currentTower].name;
document.getElementById('floor').textContent=`Floor ${Math.floor(state.floor)} • ${phase()}`;
}
function loop(){
update();
drawBackground();
drawTower();
requestAnimationFrame(loop);
}
loop();
window.addEventListener('keydown',e=>{
if(e.key==='a') state.left=true;
if(e.key==='d') state.right=true;
if(e.key===' ') jump();
if(e.key==='r') state.resting=true;
});
window.addEventListener('keyup',e=>{
if(e.key==='a') state.left=false;
if(e.key==='d') state.right=false;
if(e.key==='r') state.resting=false;
});
// mobile controls
const joy=document.getElementById('joy');
const stick=document.getElementById('stick');
let dragging=false;
joy.addEventListener('touchstart',()=>dragging=true);
window.addEventListener('touchend',()=>{
dragging=false;
state.left=false;
state.right=false;
stick.style.transform='translate(0px,0px)';
});
window.addEventListener('touchmove',e=>{
if(!dragging)return;
const t=e.touches[0];
const rect=joy.getBoundingClientRect();
const dx=t.clientX-(rect.left+60);
stick.style.transform=`translate(${Math.max(-24,Math.min(24,dx))}px,0px)`;
state.left=dx<-8;
state.right=dx>8;
});
document.getElementById('jump-btn').addEventListener('touchstart',jump);
document.getElementById('rest-btn').addEventListener('touchstart',()=>state.resting=true);
document.getElementById('rest-btn').addEventListener('touchend',()=>state.resting=false);
document.querySelectorAll('.tower-btn').forEach(btn=>{
btn.addEventListener('click',()=>{
currentTower=btn.dataset.tower;
});
});
</script>
</body>
</html>
