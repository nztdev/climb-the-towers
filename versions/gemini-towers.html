<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE TOWER - Eternal Ascent</title>
    <style>
        :root {
            --accent: #4fd1c5;
            --bg-dark: #050810;
            --ui-panel: rgba(13, 17, 23, 0.85);
            --text-main: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            filter: contrast(1.1) brightness(0.9); /* Cinematic pass */
        }

        canvas { position: absolute; top: 0; left: 0; }
        #bg-canvas { z-index: 1; transition: filter 2s ease; }
        #game-canvas { z-index: 2; }

        /* Modernized UI */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            padding: 25px;
        }

        #top-bar {
            display: flex;
            justify-content: space-between;
            background: var(--ui-panel);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 30px;
            border-radius: 12px;
            pointer-events: auto;
        }

        .stat-group { display: flex; flex-direction: column; gap: 4px; }
        .stat-label { font-size: 10px; color: #718096; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-family: 'Courier New', monospace; font-weight: bold; font-size: 18px; color: var(--accent); }

        /* Dynamic Stamina */
        #stamina-container { width: 120px; height: 4px; background: #2d3748; border-radius: 2px; overflow: hidden; margin-top: 5px; }
        #stamina-bar { height: 100%; background: var(--accent); transition: width 0.1s linear, background 0.3s ease; }

        /* Critical Warning Overlay */
        #vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
            pointer-events: none; transition: box-shadow 0.5s ease;
        }

        #death-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 8, 16, 0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; pointer-events: auto;
        }

        .btn-modern {
            padding: 12px 32px; background: var(--accent); border: none;
            border-radius: 6px; font-weight: 700; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-modern:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(79, 209, 197, 0.4); }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="vignette"></div>
        <canvas id="bg-canvas"></canvas>
        <canvas id="game-canvas"></canvas>

        <div id="ui-layer">
            <div id="top-bar">
                <div class="stat-group">
                    <span class="stat-label">Location</span>
                    <span id="tower-name" class="stat-value">TOKYO SKYTREE</span>
                </div>
                <div class="stat-group">
                    <span class="stat-label">Altitude</span>
                    <span id="floor-display" class="stat-value">F.001</span>
                </div>
                <div class="stat-group">
                    <span class="stat-label">Stamina</span>
                    <div id="stamina-container"><div id="stamina-bar"></div></div>
                </div>
            </div>
        </div>

        <div id="death-screen">
            <h1 style="font-size: 64px; letter-spacing: 10px; color: #fc8181;">FALLEN</h1>
            <p id="death-reason" style="margin: 20px 0; color: #718096; font-style: italic;"></p>
            <button class="btn-modern" onclick="engine.respawn()">BEGIN AGAIN</button>
        </div>
    </div>

    <script>
        /**
         * MODULAR MANIFEST
         * Centralized data for easy expansion.
         */
        const TOWER_DATA = {
            tokyo: { name: "Tokyo Skytree", color: "#4fd1c5", gravity: 0.5, bg: "#0a0a1a" },
            paris: { name: "Eiffel Tower", color: "#f6ad55", gravity: 0.48, bg: "#0f0a1a" }
        };

        class GameEngine {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.bgCanvas = document.getElementById('bg-canvas');
                this.bgCtx = this.bgCanvas.getContext('2d');
                
                this.state = {
                    floor: 1,
                    stamina: 100,
                    x: 0.5,
                    y: 0,
                    vy: 0,
                    onGround: true,
                    facing: 1,
                    dead: false,
                    camY: 0,
                    time: 0
                };

                this.config = TOWER_DATA.tokyo;
                this.init();
            }

            init() {
                window.addEventListener('resize', () => this.resize());
                this.resize();
                this.bindInput();
                this.loop();
            }

            resize() {
                this.w = this.canvas.width = this.bgCanvas.width = window.innerWidth;
                this.h = this.canvas.height = this.bgCanvas.height = window.innerHeight;
            }

            bindInput() {
                this.keys = {};
                window.addEventListener('keydown', e => this.keys[e.key.toLowerCase()] = true);
                window.addEventListener('keyup', e => this.keys[e.key.toLowerCase()] = false);
                window.addEventListener('keydown', e => {
                    if(e.code === 'Space' && this.state.onGround && !this.state.dead) {
                        this.state.vy = -12;
                        this.state.onGround = false;
                        this.state.stamina -= 3;
                    }
                });
            }

            update() {
                if (this.state.dead) return;

                // Physics logic
                const speed = 0.004;
                if (this.keys.a) { this.state.x -= speed; this.state.facing = -1; }
                if (this.keys.d) { this.state.x += speed; this.state.facing = 1; }
                this.state.x = Math.max(0.1, Math.min(0.9, this.state.x));

                // Gravity logic (Scales with height)
                const gravityScale = Math.max(0.2, 0.5 - (this.state.floor / 5000));
                if (!this.state.onGround) {
                    this.state.vy += gravityScale;
                    this.state.y += this.state.vy;
                    if (this.state.y >= 0) {
                        this.state.y = 0;
                        this.state.vy = 0;
                        this.state.onGround = true;
                    }
                }

                // Stamina & Death
                this.state.stamina -= 0.015;
                if (this.state.stamina <= 0) this.die("Exhaustion took hold.");

                // Camera
                const targetCam = this.state.floor * 140 - this.h * 0.7;
                this.state.camY += (targetCam - this.state.camY) * 0.1;

                this.updateUI();
            }

            updateUI() {
                const sBar = document.getElementById('stamina-bar');
                const vig = document.getElementById('vignette');
                sBar.style.width = `${this.state.stamina}%`;
                
                if (this.state.stamina < 25) {
                    sBar.style.background = "#fc8181";
                    vig.style.boxShadow = `inset 0 0 150px rgba(252, 129, 129, ${0.2 + Math.sin(Date.now()*0.01)*0.1})`;
                } else {
                    sBar.style.background = this.config.color;
                    vig.style.boxShadow = "inset 0 0 100px rgba(0,0,0,0.8)";
                }

                document.getElementById('floor-display').textContent = `F.${this.state.floor.toString().padStart(3, '0')}`;
            }

            draw() {
                this.ctx.clearRect(0, 0, this.w, this.h);
                this.drawTower();
                if (!this.state.dead) this.drawAestheticHuman();
            }

            drawAestheticHuman() {
                const centerX = this.w / 2;
                const pX = (centerX - 150) + (this.state.x * 300);
                const pY = (this.state.floor * 140 - this.state.camY) + this.state.y;

                this.ctx.save();
                this.ctx.translate(pX, pY);

                // Glow Core
                const gradient = this.ctx.createRadialGradient(0, -20, 0, 0, -20, 15);
                gradient.addColorStop(0, 'rgba(255,255,255,0.8)');
                gradient.addColorStop(1, 'transparent');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(-20, -40, 40, 40);

                // Silhouette Body
                this.ctx.strokeStyle = "white";
                this.ctx.lineWidth = 2.5;
                this.ctx.lineCap = "round";

                // Torso (Slight lean)
                this.ctx.beginPath();
                this.ctx.moveTo(0, 0);
                this.ctx.lineTo(this.state.facing * 3, -25);
                this.ctx.stroke();

                // Head (Floating)
                this.ctx.beginPath();
                this.ctx.arc(this.state.facing * 5, -35, 4, 0, Math.PI * 2);
                this.ctx.fillStyle = "white";
                this.ctx.fill();

                // Dynamic Legs (Based on vy)
                const legWiggle = Math.sin(Date.now() * 0.01) * 5;
                this.ctx.beginPath();
                this.ctx.moveTo(0, 0);
                this.ctx.lineTo(-5 + (this.state.onGround ? 0 : legWiggle), 12); // Leg L
                this.ctx.stroke();

                this.ctx.beginPath();
                this.ctx.moveTo(0, 0);
                this.ctx.lineTo(5 - (this.state.onGround ? 0 : legWiggle), 12); // Leg R
                this.ctx.stroke();

                this.ctx.restore();
            }

            drawTower() {
                const centerX = this.w / 2;
                for (let i = -2; i < 10; i++) {
                    const f = Math.floor(this.state.camY / 140) + i;
                    const fY = f * 140 - this.state.camY;
                    
                    // Platform
                    this.ctx.fillStyle = "rgba(45, 55, 72, 0.5)";
                    this.ctx.fillRect(centerX - 150, fY, 300, 8);
                    this.ctx.strokeStyle = this.config.color;
                    this.ctx.strokeRect(centerX - 150, fY, 300, 8);
                }
            }

            die(reason) {
                this.state.dead = true;
                document.getElementById('death-reason').textContent = reason;
                document.getElementById('death-screen').style.display = 'flex';
            }

            respawn() {
                this.state = { ...this.state, floor: 1, stamina: 100, dead: false, y: 0 };
                document.getElementById('death-screen').style.display = 'none';
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        const engine = new GameEngine();
    </script>
</body>
</html>
