<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE TOWER | Global Ascent by Gemini</title>
    <style>
        :root {
            --ui-bg: rgba(10, 15, 25, 0.85);
            --text: #f8fafc;
            --accent: #4fd1c5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

        body {
            background: #020408;
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #stage { position: relative; width: 100%; height: 100%; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #bg-canvas { z-index: 1; }
        #game-canvas { z-index: 2; }

        /* HUD */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; z-index: 10;
            padding: 20px; display: flex; justify-content: space-between;
            pointer-events: none;
        }

        .stat-box {
            background: var(--ui-bg);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; display: block; }
        .value { font-family: 'Courier New', monospace; font-size: 1.2rem; font-weight: bold; color: var(--accent); }

        /* Tower Selector */
        #tower-nav {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; gap: 10px;
        }

        .tower-btn {
            background: var(--ui-bg);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 10px 20px; border-radius: 4px;
            cursor: pointer; font-size: 12px; transition: 0.3s;
        }

        .tower-btn.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 15px rgba(79, 209, 197, 0.3); }

        /* Mobile Controls Overlay (Visible only on touch) */
        #mobile-hint {
            position: absolute; bottom: 100px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.3); font-size: 12px; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="stage">
    <canvas id="bg-canvas"></canvas>
    <canvas id="game-canvas"></canvas>

    <div id="hud">
        <div class="stat-box">
            <span class="label">Location</span>
            <span id="loc-val" class="value">TOKYO</span>
        </div>
        <div class="stat-box" style="text-align: right;">
            <span class="label">Altitude</span>
            <span id="alt-val" class="value">0m</span>
        </div>
    </div>

    <div id="mobile-hint">TAP LEFT/RIGHT TO MOVE • SWIPE UP TO JUMP</div>

    <div id="tower-nav">
        <button class="tower-btn active" onclick="engine.switchTower('tokyo')">TOKYO</button>
        <button class="tower-btn" onclick="engine.switchTower('paris')">PARIS</button>
        <button class="tower-btn" onclick="engine.switchTower('newyork')">NEW YORK</button>
    </div>
</div>

<script>
/**
 * MODULAR TOWER MANIFEST
 * Easy to add new cities without changing core logic.
 */
const TOWER_MANIFEST = {
    tokyo: {
        name: "TOKYO",
        accent: "#4fd1c5",
        landmark: "Skytree",
        gravity: 0.45,
        horizonColor: "#1a1c2c",
        skyColor: "#050508"
    },
    paris: {
        name: "PARIS",
        accent: "#f6ad55",
        landmark: "Eiffel Tower",
        gravity: 0.42,
        horizonColor: "#2c1a1a",
        skyColor: "#080505"
    },
    newyork: {
        name: "NEW YORK",
        accent: "#63b3ed",
        landmark: "Empire State",
        gravity: 0.48,
        horizonColor: "#1a2c22",
        skyColor: "#050806"
    }
};

class TowerEngine {
    constructor() {
        this.canvas = document.getElementById('game-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.bgCanvas = document.getElementById('bg-canvas');
        this.bgCtx = this.bgCanvas.getContext('2d');
        
        this.w = window.innerWidth;
        this.h = window.innerHeight;
        
        this.currentTower = 'tokyo';
        this.player = {
            x: 0.5,
            y: 0,
            vy: 0,
            onGround: true,
            walkFrame: 0,
            facing: 1
        };
        
        this.state = {
            altitude: 0,
            camY: 0,
            input: { left: false, right: false, jump: false }
        };

        this.init();
    }

    init() {
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.setupControls();
        this.loop();
    }

    resize() {
        this.w = this.canvas.width = this.bgCanvas.width = window.innerWidth;
        this.h = this.canvas.height = this.bgCanvas.height = window.innerHeight;
    }

    setupControls() {
        // Keyboard
        window.addEventListener('keydown', e => this.handleKey(e, true));
        window.addEventListener('keyup', e => this.handleKey(e, false));

        // Mobile Touch
        window.addEventListener('touchstart', e => {
            const touchX = e.touches[0].clientX;
            if (touchX < this.w / 2) this.state.input.left = true;
            else this.state.input.right = true;
        });

        window.addEventListener('touchend', () => {
            this.state.input.left = false;
            this.state.input.right = false;
        });

        // Swipe for Jump
        let startY = 0;
        window.addEventListener('touchstart', e => startY = e.touches[0].clientY);
        window.addEventListener('touchend', e => {
            if (startY - e.changedTouches[0].clientY > 50) this.state.input.jump = true;
        });
    }

    handleKey(e, isDown) {
        if (e.key === 'ArrowLeft' || e.key === 'a') this.state.input.left = isDown;
        if (e.key === 'ArrowRight' || e.key === 'd') this.state.input.right = isDown;
        if (e.code === 'Space' || e.key === 'w') this.state.input.jump = isDown;
    }

    switchTower(id) {
        this.currentTower = id;
        document.querySelectorAll('.tower-btn').forEach(b => {
            b.classList.toggle('active', b.innerText.toLowerCase().replace(" ","") === id);
        });
        document.getElementById('loc-val').innerText = TOWER_MANIFEST[id].name;
        this.state.altitude = 0;
        this.player.y = 0;
    }

    update() {
        const config = TOWER_MANIFEST[this.currentTower];
        
        // Movement
        if (this.state.input.left) { this.player.x -= 0.005; this.player.facing = -1; this.player.walkFrame += 0.2; }
        if (this.state.input.right) { this.player.x += 0.005; this.player.facing = 1; this.player.walkFrame += 0.2; }
        this.player.x = Math.max(0.2, Math.min(0.8, this.player.x));

        // Jump
        if (this.state.input.jump && this.player.onGround) {
            this.player.vy = -12;
            this.player.onGround = false;
            this.state.input.jump = false;
        }

        // Gravity
        if (!this.player.onGround) {
            this.player.vy += config.gravity;
            this.player.y += this.player.vy;
            if (this.player.y >= 0) {
                this.player.y = 0;
                this.player.onGround = true;
                this.state.altitude++;
            }
        }

        // Camera
        const targetCam = this.state.altitude * 120;
        this.state.camY += (targetCam - this.state.camY) * 0.1;
        document.getElementById('alt-val').innerText = `${this.state.altitude * 10}m`;
    }

    draw() {
        this.ctx.clearRect(0, 0, this.w, this.h);
        this.drawBackground();
        this.drawPlatforms();
        this.drawRealisticPlayer();
    }

    drawBackground() {
        const config = TOWER_MANIFEST[this.currentTower];
        const fade = Math.min(1, this.state.altitude / 50); // Fades out by floor 50
        
        // Gradient sky
        const grad = this.bgCtx.createLinearGradient(0, 0, 0, this.h);
        grad.addColorStop(0, config.skyColor);
        grad.addColorStop(1, config.horizonColor);
        this.bgCtx.fillStyle = grad;
        this.bgCtx.fillRect(0,0,this.w,this.h);

        // Landmark
        this.bgCtx.save();
        this.bgCtx.globalAlpha = 1 - fade;
        this.bgCtx.fillStyle = "rgba(255,255,255,0.05)";
        this.bgCtx.font = "bold 200px Arial";
        this.bgCtx.textAlign = "center";
        this.bgCtx.fillText(config.landmark, this.w/2, this.h - (this.state.camY * 0.2));
        this.bgCtx.restore();
    }

    drawPlatforms() {
        const centerX = this.w / 2;
        const config = TOWER_MANIFEST[this.currentTower];
        for(let i = -5; i < 10; i++) {
            const f = Math.floor(this.state.camY / 120) + i;
            if (f < 0) continue;
            const y = this.h - 100 - (f * 120 - this.state.camY);
            
            this.ctx.fillStyle = `rgba(255,255,255,${0.1 + (i*0.05)})`;
            this.ctx.fillRect(centerX - 150, y, 300, 4);
            
            this.ctx.shadowBlur = 15;
            this.ctx.shadowColor = config.accent;
            this.ctx.strokeStyle = config.accent;
            this.ctx.strokeRect(centerX - 150, y, 300, 1);
            this.ctx.shadowBlur = 0;
        }
    }

    drawRealisticPlayer() {
        const pX = (this.w / 2 - 150) + (this.player.x * 300);
        const pY = (this.h - 100) + this.player.y;
        const config = TOWER_MANIFEST[this.currentTower];

        this.ctx.save();
        this.ctx.translate(pX, pY);
        this.ctx.scale(this.player.facing, 1);

        const walk = Math.sin(this.player.walkFrame) * 10;
        
        // Shadow/Glow
        this.ctx.shadowBlur = 20;
        this.ctx.shadowColor = config.accent;

        // Legs
        this.ctx.strokeStyle = "#fff";
        this.ctx.lineWidth = 3;
        this.ctx.beginPath();
        this.ctx.moveTo(0, -20); 
        this.ctx.lineTo(-5 + (this.player.onGround ? walk : 10), 0); // Leg L
        this.ctx.moveTo(0, -20);
        this.ctx.lineTo(5 - (this.player.onGround ? walk : 10), 0); // Leg R
        this.ctx.stroke();

        // Torso
        this.ctx.fillStyle = "#fff";
        this.ctx.fillRect(-4, -45, 8, 25);

        // Head (Floating slightly for style)
        this.ctx.beginPath();
        this.ctx.arc(0, -55, 6, 0, Math.PI*2);
        this.ctx.fill();

        this.ctx.restore();
    }

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
}

const engine = new TowerEngine();
</script>
</body>
</html>
